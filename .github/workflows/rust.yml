name: Build and Publish Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    if: "${{ startsWith(github.ref, 'refs/tags/') || !startsWith(github.event.head_commit.message, 'chore: bump version') }}"
    permissions:
      contents: write # Required to create a GitHub Release

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      run: |
        rustup update stable
        rustup target add x86_64-unknown-linux-gnu
        rustup target add aarch64-unknown-linux-gnu

    - name: Install aarch64 cross-compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Build x86_64 (Remote Prod)
      run: cargo build --release --target x86_64-unknown-linux-gnu

    - name: Build aarch64 (Local Demo)
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      run: cargo build --release --target aarch64-unknown-linux-gnu

    - name: Rename binaries for release
      run: |
        mv target/x86_64-unknown-linux-gnu/release/sratim sratim-x86_64
        mv target/aarch64-unknown-linux-gnu/release/sratim sratim-aarch64

    - name: Publish GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          sratim-x86_64
          sratim-aarch64
        generate_release_notes: true
