name: Build Arch Linux Binary

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build Arch Linux x86_64 Executable
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Update Pacman & Install System Dependencies
        run: |
          pacman -Syu --noconfirm git sqlite ffmpeg curl tar xz pkgconf

      - name: Download & Install Zig 0.16.0
        run: |
          curl -L -o zig.tar.xz https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
          mkdir -p /opt/zig
          tar -xf zig.tar.xz -C /opt/zig --strip-components=1
          echo "/opt/zig" >> $GITHUB_PATH

      - name: Build Binary (-Doptimize=ReleaseFast -Dcpu=silvermont)
        run: |
          /opt/zig/zig build -Doptimize=ReleaseFast -Dcpu=silvermont

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v5
        with:
          name: sratim-arch-n3150
          path: zig-out/bin/sratim
          retention-days: 30
