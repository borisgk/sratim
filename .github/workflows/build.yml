name: Build Arch Linux Binary

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build Arch Linux x86_64 Executable
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update Pacman & Install System Dependencies
        run: |
          pacman -Syu --noconfirm git sqlite ffmpeg curl tar xz pkgconf

      - name: Download & Install Zig 0.16.0
        run: |
          pacman -S --noconfirm jq
          ZIG_URL=$(curl -s https://ziglang.org/download/index.json | jq -r '."0.16.0"["x86_64-linux"].tarball // .master["x86_64-linux"].tarball')
          echo "Downloading Zig from $ZIG_URL"
          curl -L -o zig.tar.xz "$ZIG_URL"
          mkdir -p /opt/zig
          tar -xf zig.tar.xz -C /opt/zig --strip-components=1
          echo "/opt/zig" >> $GITHUB_PATH

      - name: Build Binary (-Doptimize=ReleaseFast)
        run: |
          /opt/zig/zig build -Doptimize=ReleaseFast

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sratim-arch-x86_64
          path: zig-out/bin/sratim
          retention-days: 30
