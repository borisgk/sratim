<!DOCTYPE html>
<html>
<head>
    <title>Sratim Stream</title>
    <style>
        body { margin: 0; background: #000; height: 100vh; font-family: sans-serif; color: white; overflow: hidden; }
        .player-wrapper { display: flex; flex-direction: column; height: 100%; width: 100%; }
        video { width: 100%; flex: 1; min-height: 0; background: #000; display: block; object-fit: contain; }
        .controls { display: flex; align-items: center; padding: 10px; background: #222; flex-shrink: 0; }
        button { background: #444; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; padding: 0; }
        button:hover { background: #555; }
        #playpause { margin-right: 15px; }
        #fullscreen { margin-left: 15px; }
        .seek-bar { flex: 1; margin: 0 10px; cursor: pointer; height: 10px; background: #444; position: relative; border-radius: 5px; overflow: hidden; }
        .seek-fill { background: #f00; height: 100%; width: 0%; pointer-events: none; }
        .time { font-variant-numeric: tabular-nums; }
        #audio-menu { position: absolute; bottom: 65px; right: 15px; background: rgba(30,30,30,0.9); border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .hidden { display: none !important; }
        .audio-track-btn { background: transparent; color: white; border: none; padding: 8px 12px; text-align: left; cursor: pointer; border-radius: 4px; width: auto; height: auto; display: block; white-space: nowrap; }
        .audio-track-btn:hover { background: #444; }
        .audio-track-btn.active { background: #666; font-weight: bold; }
    </style>
</head>
<body>
    <div class="player-wrapper">
        <video id="video" autoplay playsinline></video>
        <div class="controls">
            <button id="playpause">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <div class="time" id="time-current">0:00</div>
            <div class="seek-bar" id="seekbar">
                <div class="seek-fill" id="seekfill"></div>
            </div>
            <div class="time" id="time-total">__TIME_STR__</div>
            <button id="audiobtn" style="display: none; margin-left: 15px;">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            <button id="fullscreen">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            </button>
        </div>
        <div id="audio-menu" class="hidden"></div>
    </div>
    <script>
        const video = document.getElementById('video');
        const playpause = document.getElementById('playpause');
        const seekbar = document.getElementById('seekbar');
        const seekfill = document.getElementById('seekfill');
        const timeCurrent = document.getElementById('time-current');
        const btnFullscreen = document.getElementById('fullscreen');
        const playerWrapper = document.querySelector('.player-wrapper');
        
        const DURATION = __DURATION__; // Real duration
        const fileName = "__FILE_NAME__";
        const codecStr = '__CODEC_STR__';
        const AUDIO_TRACKS = __AUDIO_TRACKS_JSON__;
        let currentSeekTime = 0;
        let currentAudioIdx = -1;
        let abortController = null;
        let currentObjectUrl = null;

        const urlParams = new URLSearchParams(window.location.search);
        const libraryId = urlParams.get('library') || '';

        const svgPlay = '<svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M8 5v14l11-7z"/></svg>';
        const svgPause = '<svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
        const svgFullscreen = '<svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>';
        const svgExitFullscreen = '<svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>';

        // Setup Audio Menu
        const btnAudio = document.getElementById('audiobtn');
        const audioMenu = document.getElementById('audio-menu');
        
        if (AUDIO_TRACKS && AUDIO_TRACKS.length > 1) {
            btnAudio.style.display = 'flex';
            AUDIO_TRACKS.forEach((track, i) => {
                const btn = document.createElement('button');
                btn.className = 'audio-track-btn';
                btn.innerText = track.label || `Track ${track.id}`;
                if (i === 0) btn.classList.add('active');
                
                btn.onclick = () => {
                    if (currentAudioIdx === track.id) return;
                    currentAudioIdx = track.id;
                    audioMenu.classList.add('hidden');
                    document.querySelectorAll('.audio-track-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    // Seamless switch
                    const resumeTime = currentSeekTime + video.currentTime;
                    loadVideo(resumeTime);
                };
                audioMenu.appendChild(btn);
            });

            btnAudio.addEventListener('click', (e) => {
                e.stopPropagation();
                audioMenu.classList.toggle('hidden');
            });

            // Close audio menu when clicking outside
            document.addEventListener('click', (e) => {
                if (!audioMenu.contains(e.target) && e.target !== btnAudio) {
                    audioMenu.classList.add('hidden');
                }
            });
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        async function fetchAndAppend(sourceBuffer, startTime, signal) {
            try {
                const audioParam = currentAudioIdx >= 0 ? `&audio=${currentAudioIdx}` : '';
                const libParam = libraryId ? `&library=${libraryId}` : '';
                const response = await fetch(`/stream?file=${encodeURIComponent(fileName)}&start=${startTime}${audioParam}${libParam}`, { signal });
                const reader = response.body.getReader();

                let queue = [];
                let isAppending = false;
                let isQuotaExceeded = false;

                function processQueue() {
                    if (isAppending || queue.length === 0 || signal.aborted) return;
                    isAppending = true;
                    
                    // Combine chunks to minimize appendBuffer overhead
                    let totalLen = 0;
                    for (let q of queue) totalLen += q.length;
                    let combined = new Uint8Array(totalLen);
                    let offset = 0;
                    for (let q of queue) {
                        combined.set(q, offset);
                        offset += q.length;
                    }
                    queue = [];

                    try {
                        sourceBuffer.appendBuffer(combined);
                        isQuotaExceeded = false;
                    } catch (e) {
                        if (e.name === 'QuotaExceededError') {
                            // Buffer is physically full, wait and retry
                            queue.unshift(combined);
                            isAppending = false;
                            isQuotaExceeded = true;
                            setTimeout(processQueue, 1000);
                        } else {
                            console.error('Append error:', e);
                        }
                    }
                }

                sourceBuffer.addEventListener('updateend', () => {
                    isAppending = false;
                    processQueue();
                });

                while (!signal.aborted) {
                    // Backpressure: pause if JS queue is growing out of control OR buffer is physically full
                    if (isQuotaExceeded || queue.length > 50) {
                        await new Promise(r => setTimeout(r, 100));
                        continue;
                    }

                    // Pause if buffer is far ahead (120 seconds)
                    if (sourceBuffer.buffered.length > 0) {
                        const end = sourceBuffer.buffered.end(sourceBuffer.buffered.length - 1);
                        if (end - video.currentTime > 120) {
                            await new Promise(r => setTimeout(r, 1000));
                            continue;
                        }
                    }

                    const {done, value} = await reader.read();
                    if (done) break;

                    queue.push(value);
                    if (!isAppending) processQueue();
                }
            } catch (e) {
                if (e.name !== 'AbortError') console.error('Fetch error:', e);
            }
        }

        function loadVideo(startTime) {
            currentSeekTime = startTime;
            
            if (abortController) abortController.abort();
            abortController = new AbortController();
            const signal = abortController.signal;

            // Revoke old Blob URL to prevent memory leak
            if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);

            const ms = new MediaSource();
            currentObjectUrl = URL.createObjectURL(ms);
            video.src = currentObjectUrl;

            ms.addEventListener('sourceopen', () => {
                if (signal.aborted) return;
                const sourceBuffer = ms.addSourceBuffer(codecStr);
                fetchAndAppend(sourceBuffer, startTime, signal);
            });
            
            video.play().catch(e => console.error("Play failed:", e));
            playpause.innerHTML = svgPause;
        }

        video.addEventListener('timeupdate', () => {
            const actualTime = currentSeekTime + video.currentTime;
            const percentage = (actualTime / DURATION) * 100;
            seekfill.style.width = percentage + '%';
            timeCurrent.innerText = formatTime(actualTime);
        });

        playpause.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                playpause.innerHTML = svgPause;
            } else {
                video.pause();
                playpause.innerHTML = svgPlay;
            }
        });

        seekbar.addEventListener('click', (e) => {
            const rect = seekbar.getBoundingClientRect();
            const percentage = (e.clientX - rect.left) / rect.width;
            const seekTo = Math.max(0, Math.floor(percentage * DURATION));
            loadVideo(seekTo);
        });

        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                playerWrapper.requestFullscreen().catch(err => console.error(err));
            } else {
                document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                btnFullscreen.innerHTML = svgExitFullscreen;
            } else {
                btnFullscreen.innerHTML = svgFullscreen;
            }
        });

        // Initial load
        loadVideo(0);
    </script>
</body>
</html>
