<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sratim — __SHOW_TITLE__</title>
    <style>__INLINE_CSS__</style>
</head>
<body>
    __SHOW_BACKDROP_HTML__
    <div class="container">
        <a href="/library?id=__LIBRARY_ID__" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            __LIBRARY_NAME__
        </a>
        <a href="/logout" class="logout-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Logout
        </a>
        <header>
            <h1>__SHOW_TITLE__</h1>
        </header>

        <div class="search-container">
            <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" id="search-input" class="search-input" placeholder="Search episodes..." autocomplete="off">
        </div>

        <div class="seasons-container">
            __SEASONS_HTML__
            <div id="no-results" class="no-results">No episodes found matching your search.</div>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const rows = document.querySelectorAll('.episode-row');
        const noResults = document.getElementById('no-results');

        if (searchInput) {
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                let hasMatches = false;

                rows.forEach(row => {
                    const name = (row.getAttribute('data-name') || '').toLowerCase();
                    const text = row.innerText.toLowerCase();

                    if (query === '' || name.includes(query) || text.includes(query)) {
                        row.style.display = '';
                        hasMatches = true;
                    } else {
                        row.style.display = 'none';
                    }
                });

                if (hasMatches || query === '') {
                    noResults.style.display = 'none';
                } else {
                    noResults.style.display = 'block';
                }
            });
        }

        // Context Menu Handlers
        document.querySelectorAll('.context-menu-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const dropdown = btn.nextElementSibling;
                const isCurrentlyActive = dropdown.classList.contains('active');
                
                // Close all dropdowns
                document.querySelectorAll('.context-dropdown').forEach(d => d.classList.remove('active'));
                
                if (!isCurrentlyActive) {
                    dropdown.classList.add('active');
                }
            });
        });

        // Close dropdowns on clicking anywhere else
        document.addEventListener('click', () => {
            document.querySelectorAll('.context-dropdown').forEach(d => d.classList.remove('active'));
        });

        document.querySelectorAll('.movie-card').forEach(card => {
            const playLink = card.querySelector('.play-link');
            if (playLink) {
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.context-menu-btn') || e.target.closest('.context-dropdown')) return;
                    window.location.href = playLink.href;
                });
            }
        });
    </script>
</body>
</html>
