<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sratim — Browse</title>
    <link rel="stylesheet" href="/style.css?v=3">
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Libraries
        </a>
        <a href="/logout" class="logout-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Logout
        </a>
        <header>
            <h1>__LIBRARY_NAME__</h1>
            <p class="subtitle">__LIBRARY_PATH__</p>
        </header>

        <div class="search-container">
            <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" id="search-input" class="search-input" placeholder="Search files in this library..." autocomplete="off">
        </div>

        <div class="grid" id="movie-grid">
            __MOVIE_CARDS__
            <div id="no-results" class="no-results">No movies found matching your search.</div>
        </div>
    </div>



    <script>
        const searchInput = document.getElementById('search-input');
        const cards = document.querySelectorAll('.movie-card');
        const noResults = document.getElementById('no-results');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            let hasMatches = false;

            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                if (name.includes(query)) {
                    card.style.display = 'flex';
                    hasMatches = true;
                } else {
                    card.style.display = 'none';
                }
            });

            if (hasMatches || query === '') {
                noResults.style.display = 'none';
            } else {
                noResults.style.display = 'block';
            }
        });

        // Context Menu Handlers
        document.querySelectorAll('.context-menu-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const dropdown = btn.nextElementSibling;
                const isCurrentlyActive = dropdown.classList.contains('active');
                
                // Close all dropdowns
                document.querySelectorAll('.context-dropdown').forEach(d => d.classList.remove('active'));
                
                if (!isCurrentlyActive) {
                    dropdown.classList.add('active');
                }
            });
        });

        // Close dropdowns on clicking anywhere else
        document.addEventListener('click', () => {
            document.querySelectorAll('.context-dropdown').forEach(d => d.classList.remove('active'));
        });

        // Handle Dropdown Item clicks
        document.querySelectorAll('.dropdown-item').forEach(item => {
            item.addEventListener('click', async (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const file = item.getAttribute('data-file');
                const libraryId = item.getAttribute('data-library');
                const action = item.classList.contains('reset-btn') ? 'reset' : 'watched';
                const card = item.closest('.movie-card');
                
                try {
                    const res = await fetch('/api/watch/progress/update', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            library_id: parseInt(libraryId, 10),
                            file: file,
                            action: action
                        })
                    });
                    
                    if (res.ok) {
                        // Remove the progress bar if present since both "reset" and "watched" hide it
                        const progressEl = card.querySelector('.card-progress');
                        if (progressEl) {
                            progressEl.remove();
                        }
                    } else {
                        console.error('Failed to update progress');
                    }
                } catch (err) {
                    console.error('Error updating progress:', err);
                }
                
                // Close dropdown
                item.parentElement.classList.remove('active');
            });
        });

        // Automatic Lookup Logic
        document.querySelectorAll('.lookup-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const file = btn.getAttribute('data-file');
                const libraryId = btn.getAttribute('data-library');
                
                const originalText = btn.innerText;
                btn.innerText = 'Looking up...';
                btn.disabled = true;

                try {
                    const res = await fetch('/api/metadata/auto-link', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            library_id: parseInt(libraryId, 10),
                            file: file
                        })
                    });
                    
                    if (res.ok) {
                        window.location.reload();
                    } else {
                        const text = await res.text();
                        alert('Lookup failed: ' + text);
                        btn.innerText = originalText;
                        btn.disabled = false;
                    }
                } catch (err) {
                    console.error('Error lookup metadata:', err);
                    alert('Error lookup metadata');
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
                
                // Close dropdown
                btn.parentElement.classList.remove('active');
            });
        });
    </script>
</body>
</html>
