<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sratim — Browse</title>
    <style>__INLINE_CSS__</style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Libraries
        </a>
        __RESCAN_BTN__
        <a href="/logout" class="logout-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Logout
        </a>
        <header>
            <h1>__LIBRARY_NAME__</h1>
            <p class="subtitle">__LIBRARY_PATH__</p>
        </header>

        <div class="search-container">
            <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" id="search-input" class="search-input" placeholder="Search files in this library..." autocomplete="off">
        </div>

        <div class="grid" id="movie-grid">
            __MOVIE_CARDS__
            <div id="no-results" class="no-results">No movies found matching your search.</div>
        </div>
    </div>

    <!-- Manual TMDB ID Modal -->
    <div id="manual-id-modal" class="modal-overlay">
        <div class="modal-card" style="max-width: 440px; width: 100%; padding: 28px; background: rgba(18, 18, 26, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; backdrop-filter: blur(16px); color: #fff;">
            <h2 style="font-family: 'Outfit', sans-serif; font-size: 1.5rem; margin-bottom: 8px;">Set TMDB ID</h2>
            <p id="current-tmdb-id-text" style="color: #9ca3af; font-size: 0.9rem; margin-bottom: 20px;">Current TMDB ID: None</p>
            <form id="manual-id-form">
                <input type="hidden" id="manual-id-movie-id">
                <div style="margin-bottom: 20px;">
                    <label for="manual-tmdb-id-input" style="display: block; font-size: 0.85rem; color: #d1d5db; margin-bottom: 8px;">TMDB Movie ID</label>
                    <input type="number" id="manual-tmdb-id-input" placeholder="e.g. 550" required style="width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 1rem;">
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 12px;">
                    <button type="button" id="manual-id-cancel-btn" style="padding: 10px 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #d1d5db; cursor: pointer;">Cancel</button>
                    <button type="submit" id="manual-id-submit-btn" style="padding: 10px 20px; background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%); border: none; border-radius: 12px; color: #fff; font-weight: 500; cursor: pointer;">Fetch & Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const cards = document.querySelectorAll('.movie-card');
        const noResults = document.getElementById('no-results');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            let hasMatches = false;

            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                if (name.includes(query)) {
                    card.style.display = 'flex';
                    hasMatches = true;
                } else {
                    card.style.display = 'none';
                }
            });

            if (hasMatches || query === '') {
                noResults.style.display = 'none';
            } else {
                noResults.style.display = 'block';
            }
        });

        // Context Menu Handlers
        document.querySelectorAll('.context-menu-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const dropdown = btn.nextElementSibling;
                const isCurrentlyActive = dropdown.classList.contains('active');
                
                // Close all dropdowns
                document.querySelectorAll('.context-dropdown').forEach(d => d.classList.remove('active'));
                
                if (!isCurrentlyActive) {
                    dropdown.classList.add('active');
                }
            });
        });

        // Close dropdowns on clicking anywhere else
        document.addEventListener('click', () => {
            document.querySelectorAll('.context-dropdown').forEach(d => d.classList.remove('active'));
        });



        // Automatic Lookup Logic
        document.querySelectorAll('.lookup-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const targetId = parseInt(btn.getAttribute('data-id'), 10);
                const itemType = btn.getAttribute('data-type') || 'movie';
                const payload = (itemType === 'show') ? { show_id: targetId } : { movie_id: targetId };
                
                const originalText = btn.innerText;
                btn.innerText = 'Looking up...';
                btn.disabled = true;

                try {
                    const res = await fetch('/api/metadata/auto-link', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (res.ok) {
                        window.location.reload();
                    } else {
                        const text = await res.text();
                        alert('Lookup failed: ' + text);
                        btn.innerText = originalText;
                        btn.disabled = false;
                    }
                } catch (err) {
                    console.error('Error lookup metadata:', err);
                    alert('Error lookup metadata');
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
                
                btn.parentElement.classList.remove('active');
            });
        });

        // Manual TMDB ID Modal Logic
        const manualModal = document.getElementById('manual-id-modal');
        const manualForm = document.getElementById('manual-id-form');
        const manualMovieIdInput = document.getElementById('manual-id-movie-id');
        const manualTmdbInput = document.getElementById('manual-tmdb-id-input');
        const currentTmdbText = document.getElementById('current-tmdb-id-text');
        const manualCancelBtn = document.getElementById('manual-id-cancel-btn');

        document.querySelectorAll('.manual-id-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();

                const targetId = btn.getAttribute('data-id');
                const itemType = btn.getAttribute('data-type') || 'movie';
                const currentTmdbId = btn.getAttribute('data-tmdb-id');

                manualMovieIdInput.value = targetId;
                manualMovieIdInput.setAttribute('data-type', itemType);

                if (currentTmdbId && currentTmdbId.trim() !== '') {
                    currentTmdbText.innerText = `Current TMDB ID: ${currentTmdbId}`;
                    manualTmdbInput.value = currentTmdbId;
                } else {
                    currentTmdbText.innerText = `Current TMDB ID: None`;
                    manualTmdbInput.value = '';
                }

                manualModal.classList.add('active');
                manualTmdbInput.focus();
                btn.parentElement.classList.remove('active');
            });
        });

        manualCancelBtn.addEventListener('click', () => {
            manualModal.classList.remove('active');
        });

        manualModal.addEventListener('click', (e) => {
            if (e.target === manualModal) {
                manualModal.classList.remove('active');
            }
        });

        manualForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const targetId = parseInt(manualMovieIdInput.value, 10);
            const itemType = manualMovieIdInput.getAttribute('data-type') || 'movie';
            const tmdbId = parseInt(manualTmdbInput.value, 10);

            const payload = (itemType === 'show')
                ? { show_id: targetId, tmdb_id: tmdbId }
                : { movie_id: targetId, tmdb_id: tmdbId };

            const submitBtn = document.getElementById('manual-id-submit-btn');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Fetching...';
            submitBtn.disabled = true;

            try {
                const res = await fetch('/api/metadata/manual-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    window.location.reload();
                } else {
                    const text = await res.text();
                    alert('Failed to set TMDB ID: ' + text);
                    submitBtn.innerText = originalText;
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error('Error linking manual TMDB ID:', err);
                alert('Error connecting to server');
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        });

        // Rescan Library Logic (Admin only)
        const rescanBtn = document.getElementById('rescan-lib-btn');
        if (rescanBtn) {
            rescanBtn.addEventListener('click', async () => {
                const libId = parseInt(rescanBtn.getAttribute('data-id'), 10);
                rescanBtn.classList.add('loading');
                rescanBtn.disabled = true;
                const originalHtml = rescanBtn.innerHTML;
                rescanBtn.innerText = 'Rescanning...';

                try {
                    const res = await fetch('/api/library/rescan', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ library_id: libId })
                    });

                    if (res.ok) {
                        window.location.reload();
                    } else {
                        const text = await res.text();
                        alert('Rescan failed: ' + text);
                        rescanBtn.innerHTML = originalHtml;
                        rescanBtn.classList.remove('loading');
                        rescanBtn.disabled = false;
                    }
                } catch (err) {
                    console.error('Error rescanning library:', err);
                    alert('Error starting library rescan');
                    rescanBtn.innerHTML = originalHtml;
                    rescanBtn.classList.remove('loading');
                    rescanBtn.disabled = false;
                }
            });
        }

        // Smart Live Metadata Polling
        const libraryIdMatch = window.location.search.match(/id=(\d+)/);
        if (libraryIdMatch) {
            const currentLibraryId = parseInt(libraryIdMatch[1], 10);
            
            function checkAndStartPolling() {
                const pendingCards = document.querySelectorAll('.movie-card[data-tmdb-id=""]');
                if (pendingCards.length === 0) return;

                let pollInterval = setInterval(async () => {
                    try {
                        const res = await fetch(`/api/library/updates?id=${currentLibraryId}`);
                        if (!res.ok) return;

                        const data = await res.json();
                        if (data.updates && Array.isArray(data.updates)) {
                            data.updates.forEach(item => {
                                const card = document.querySelector(`.movie-card[data-id="${item.id}"]`);
                                if (!card) return;

                                card.setAttribute('data-tmdb-id', item.tmdb_id);

                                if (item.poster_path && item.poster_path.trim() !== '') {
                                    card.classList.add('has-poster');
                                    let img = card.querySelector('.poster-img');
                                    if (!img) {
                                        img = document.createElement('img');
                                        img.className = 'poster-img';
                                        img.loading = 'lazy';
                                        img.alt = 'poster';
                                        card.insertBefore(img, card.firstChild);
                                    }
                                    img.src = `/images/posters/w185${item.poster_path}`;
                                }

                                if (item.title) {
                                    const movieItem = card.closest('.movie-item');
                                    if (movieItem) {
                                        const titleEl = movieItem.querySelector('.movie-title');
                                        if (titleEl) titleEl.innerText = item.title;
                                    }
                                }
                            });
                        }

                        if (data.remaining_pending === 0) {
                            clearInterval(pollInterval);
                        }
                    } catch (err) {
                        console.error('Error polling metadata updates:', err);
                    }
                }, 4000);
            }

            checkAndStartPolling();
        }
    </script>
</body>
</html>
