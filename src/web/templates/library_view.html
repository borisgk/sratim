<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sratim — Browse</title>
    <style>__INLINE_CSS__</style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Libraries
        </a>
        <a href="/logout" class="logout-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Logout
        </a>
        <header>
            <h1>__LIBRARY_NAME__</h1>
            <p class="subtitle">__LIBRARY_PATH__</p>
        </header>

        <div class="search-container">
            <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" id="search-input" class="search-input" placeholder="Search files in this library..." autocomplete="off">
        </div>

        <div class="grid" id="movie-grid">
            __MOVIE_CARDS__
            <div id="no-results" class="no-results">No movies found matching your search.</div>
        </div>
    </div>

    <!-- Manual TMDB ID Modal -->
    <div id="manual-id-modal" class="modal-overlay">
        <div class="modal-card" style="max-width: 440px; width: 100%; padding: 28px; background: rgba(18, 18, 26, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; backdrop-filter: blur(16px); color: #fff;">
            <h2 style="font-family: 'Outfit', sans-serif; font-size: 1.5rem; margin-bottom: 8px;">Set TMDB ID</h2>
            <p id="current-tmdb-id-text" style="color: #9ca3af; font-size: 0.9rem; margin-bottom: 20px;">Current TMDB ID: None</p>
            <form id="manual-id-form">
                <input type="hidden" id="manual-id-movie-id">
                <div style="margin-bottom: 20px;">
                    <label for="manual-tmdb-id-input" style="display: block; font-size: 0.85rem; color: #d1d5db; margin-bottom: 8px;">TMDB Movie ID</label>
                    <input type="number" id="manual-tmdb-id-input" placeholder="e.g. 550" required style="width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 1rem;">
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 12px;">
                    <button type="button" id="manual-id-cancel-btn" style="padding: 10px 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #d1d5db; cursor: pointer;">Cancel</button>
                    <button type="submit" id="manual-id-submit-btn" style="padding: 10px 20px; background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%); border: none; border-radius: 12px; color: #fff; font-weight: 500; cursor: pointer;">Fetch & Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const cards = document.querySelectorAll('.movie-card');
        const noResults = document.getElementById('no-results');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            let hasMatches = false;

            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                if (name.includes(query)) {
                    card.style.display = 'flex';
                    hasMatches = true;
                } else {
                    card.style.display = 'none';
                }
            });

            if (hasMatches || query === '') {
                noResults.style.display = 'none';
            } else {
                noResults.style.display = 'block';
            }
        });

        // Context Menu Handlers
        document.querySelectorAll('.context-menu-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const dropdown = btn.nextElementSibling;
                const isCurrentlyActive = dropdown.classList.contains('active');
                
                // Close all dropdowns
                document.querySelectorAll('.context-dropdown').forEach(d => d.classList.remove('active'));
                
                if (!isCurrentlyActive) {
                    dropdown.classList.add('active');
                }
            });
        });

        // Close dropdowns on clicking anywhere else
        document.addEventListener('click', () => {
            document.querySelectorAll('.context-dropdown').forEach(d => d.classList.remove('active'));
        });

        // Handle Progress Update clicks
        document.querySelectorAll('.reset-btn, .watch-btn').forEach(item => {
            item.addEventListener('click', async (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const movieId = item.getAttribute('data-id');
                const action = item.classList.contains('reset-btn') ? 'reset' : 'watched';
                const card = item.closest('.movie-card');
                
                try {
                    const res = await fetch('/api/watch/progress/update', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            movie_id: parseInt(movieId, 10),
                            action: action
                        })
                    });
                    
                    if (res.ok) {
                        const progressEl = card.querySelector('.card-progress');
                        if (progressEl) {
                            progressEl.remove();
                        }
                    } else {
                        console.error('Failed to update progress');
                    }
                } catch (err) {
                    console.error('Error updating progress:', err);
                }
                
                item.parentElement.classList.remove('active');
            });
        });

        // Automatic Lookup Logic
        document.querySelectorAll('.lookup-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const movieId = btn.getAttribute('data-id');
                
                const originalText = btn.innerText;
                btn.innerText = 'Looking up...';
                btn.disabled = true;

                try {
                    const res = await fetch('/api/metadata/auto-link', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            movie_id: parseInt(movieId, 10)
                        })
                    });
                    
                    if (res.ok) {
                        window.location.reload();
                    } else {
                        const text = await res.text();
                        alert('Lookup failed: ' + text);
                        btn.innerText = originalText;
                        btn.disabled = false;
                    }
                } catch (err) {
                    console.error('Error lookup metadata:', err);
                    alert('Error lookup metadata');
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
                
                btn.parentElement.classList.remove('active');
            });
        });

        // Manual TMDB ID Modal Logic
        const manualModal = document.getElementById('manual-id-modal');
        const manualForm = document.getElementById('manual-id-form');
        const manualMovieIdInput = document.getElementById('manual-id-movie-id');
        const manualTmdbInput = document.getElementById('manual-tmdb-id-input');
        const currentTmdbText = document.getElementById('current-tmdb-id-text');
        const manualCancelBtn = document.getElementById('manual-id-cancel-btn');

        document.querySelectorAll('.manual-id-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();

                const movieId = btn.getAttribute('data-id');
                const currentTmdbId = btn.getAttribute('data-tmdb-id');

                manualMovieIdInput.value = movieId;
                if (currentTmdbId && currentTmdbId.trim() !== '') {
                    currentTmdbText.innerText = `Current TMDB ID: ${currentTmdbId}`;
                    manualTmdbInput.value = currentTmdbId;
                } else {
                    currentTmdbText.innerText = `Current TMDB ID: None`;
                    manualTmdbInput.value = '';
                }

                manualModal.classList.add('active');
                manualTmdbInput.focus();
                btn.parentElement.classList.remove('active');
            });
        });

        manualCancelBtn.addEventListener('click', () => {
            manualModal.classList.remove('active');
        });

        manualModal.addEventListener('click', (e) => {
            if (e.target === manualModal) {
                manualModal.classList.remove('active');
            }
        });

        manualForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const movieId = parseInt(manualMovieIdInput.value, 10);
            const tmdbId = parseInt(manualTmdbInput.value, 10);

            const submitBtn = document.getElementById('manual-id-submit-btn');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Fetching...';
            submitBtn.disabled = true;

            try {
                const res = await fetch('/api/metadata/manual-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        movie_id: movieId,
                        tmdb_id: tmdbId
                    })
                });

                if (res.ok) {
                    window.location.reload();
                } else {
                    const text = await res.text();
                    alert('Failed to set TMDB ID: ' + text);
                    submitBtn.innerText = originalText;
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error('Error linking manual TMDB ID:', err);
                alert('Error connecting to server');
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
