<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sratim Stream</title>
    <link rel="stylesheet" href="/style.css?v=3">
</head>
<body>
    <div class="container">
        <a href="/logout" class="logout-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Logout
        </a>
        <header>
            <h1>Sratim</h1>
            <p class="subtitle">Select a media library to start streaming</p>
        </header>

        <div class="grid">
            __LIBRARY_CARDS__
        </div>
    </div>

    <!-- FAB -->
    <button class="fab" id="add-lib-fab" aria-label="Add Library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="24" height="24">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>

    <!-- Modal Dialog -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2 class="modal-title">Add Library</h2>
                <button class="close-btn" id="modal-close" aria-label="Close modal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22" height="22">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <form method="POST" action="/libraries/add">
                <div class="form-group">
                    <label for="lib-name">Library Name</label>
                    <input type="text" id="lib-name" name="name" required placeholder="e.g. Movies, TV Shows" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="lib-path">Folder Path</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="lib-path" name="path" required placeholder="e.g. /Users/borisk/Movies" autocomplete="off" style="flex: 1;">
                        <button type="button" id="browse-fs-btn" class="browse-pill" style="height: auto; cursor: pointer; white-space: nowrap; padding: 0 16px;">Browse...</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="lib-type">Library Type</label>
                    <select id="lib-type" name="type" required>
                        <option value="Movies">Movies</option>
                        <option value="Shows">TV Shows</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Save Library</button>
            </form>
        </div>
    </div>

    <!-- Filesystem Browser Modal -->
    <div id="fs-browser-overlay" class="modal-overlay">
        <div class="modal-card" style="max-width: 600px;">
            <div class="modal-header">
                <h3 class="modal-title">Select Folder</h3>
                <button type="button" class="close-btn" id="close-fs-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <!-- Current Path Display -->
            <div id="fs-current-path" style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 12px 16px; border-radius: 12px; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin-bottom: 20px; color: #a78bfa;">/</div>
            
            <!-- Folder List View -->
            <div id="fs-dir-list" style="max-height: 280px; overflow-y: auto; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; background: rgba(255, 255, 255, 0.01); display: flex; flex-direction: column; margin-bottom: 24px; padding: 6px; gap: 4px;">
                <!-- List items populated dynamically -->
            </div>
            
            <button type="button" id="select-dir-btn" class="submit-btn">Select Current Folder</button>
        </div>
    </div>

    <script>
        const fab = document.getElementById('add-lib-fab');
        const overlay = document.getElementById('modal-overlay');
        const closeBtn = document.getElementById('modal-close');

        // File Browser elements
        const browseFsBtn = document.getElementById('browse-fs-btn');
        const fsBrowserOverlay = document.getElementById('fs-browser-overlay');
        const closeFsBtn = document.getElementById('close-fs-btn');
        const fsCurrentPath = document.getElementById('fs-current-path');
        const fsDirList = document.getElementById('fs-dir-list');
        const selectDirBtn = document.getElementById('select-dir-btn');
        const libPathInput = document.getElementById('lib-path');

        let currentFsPath = '';

        function openModal() {
            overlay.classList.add('active');
            document.getElementById('lib-name').focus();
        }

        function closeModal() {
            overlay.classList.remove('active');
        }

        fab.addEventListener('click', openModal);
        closeBtn.addEventListener('click', closeModal);

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                closeModal();
            }
        });

        // ESC key to close modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeFsBrowser();
            }
        });

        // Folder Explorer Logic
        function openFsBrowser() {
            fsBrowserOverlay.classList.add('active');
            currentFsPath = libPathInput.value.trim();
            loadDirectory(currentFsPath);
        }

        function closeFsBrowser() {
            fsBrowserOverlay.classList.remove('active');
        }

        browseFsBtn.addEventListener('click', openFsBrowser);
        closeFsBtn.addEventListener('click', closeFsBrowser);
        fsBrowserOverlay.addEventListener('click', (e) => {
            if (e.target === fsBrowserOverlay) {
                closeFsBrowser();
            }
        });

        selectDirBtn.addEventListener('click', () => {
            libPathInput.value = currentFsPath;
            closeFsBrowser();
        });

        async function loadDirectory(path) {
            try {
                fsDirList.innerHTML = '<div style="padding: 20px; text-align: center; color: #9ca3af;">Loading folder...</div>';
                const response = await fetch('/api/browse?path=' + encodeURIComponent(path));
                if (!response.ok) throw new Error('Failed to load directory');
                const data = await response.json();

                currentFsPath = data.current;
                fsCurrentPath.innerText = currentFsPath;
                fsDirList.innerHTML = '';

                // Go Up / Parent dir row
                if (data.parent) {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'fs-dir-item parent-dir';
                    btn.innerHTML = `
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                        <span>.. (Go Up)</span>
                    `;
                    btn.onclick = () => loadDirectory(data.parent);
                    fsDirList.appendChild(btn);
                }

                // Subdirectories rows
                if (data.directories.length === 0) {
                    const emptyInfo = document.createElement('div');
                    emptyInfo.style.padding = '20px';
                    emptyInfo.style.textAlign = 'center';
                    emptyInfo.style.color = '#6b7280';
                    emptyInfo.style.fontSize = '0.9rem';
                    emptyInfo.innerText = 'No subdirectories found';
                    fsDirList.appendChild(emptyInfo);
                } else {
                    data.directories.forEach(name => {
                        const btn = document.createElement('button');
                        btn.type = 'button';
                        btn.className = 'fs-dir-item';
                        btn.innerHTML = `
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="color: #a78bfa;">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                            </svg>
                            <span>${name}</span>
                        `;
                        const nextPath = currentFsPath + (currentFsPath.endsWith('/') ? '' : '/') + name;
                        btn.onclick = () => loadDirectory(nextPath);
                        fsDirList.appendChild(btn);
                    });
                }
            } catch (err) {
                fsDirList.innerHTML = `<div style="padding: 20px; text-align: center; color: #fca5a5;">Error loading directory: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
