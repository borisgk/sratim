<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sratim — Browse</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #030308;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.06) 0%, transparent 50%);
            color: #f3f4f6;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            color: #d1d5db;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(99, 102, 241, 0.3);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
        }

        .logout-btn {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            color: #d1d5db;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.25);
            color: #fca5a5;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc 0%, #6366f1 50%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.03em;
        }

        p.subtitle {
            color: #9ca3af;
            font-size: 1.1rem;
            font-weight: 300;
            word-break: break-all;
        }

        .search-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto 50px auto;
        }

        .search-input {
            width: 100%;
            padding: 16px 24px 16px 52px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            color: #f3f4f6;
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .search-input:focus {
            outline: none;
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.4), 0 0 25px rgba(99, 102, 241, 0.15);
            background: rgba(255, 255, 255, 0.04);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            pointer-events: none;
            width: 20px;
            height: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
        }

        .movie-card {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 28px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 230px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }

        .movie-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.06) 0%, rgba(99, 102, 241, 0.06) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }

        .movie-card:hover {
            transform: translateY(-6px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(99, 102, 241, 0.1);
        }

        .movie-card:hover::before {
            opacity: 1;
        }

        .card-top {
            position: relative;
            z-index: 1;
        }

        .icon-wrapper {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #a78bfa;
            transition: all 0.3s ease;
        }

        .movie-card:hover .icon-wrapper {
            background: rgba(99, 102, 241, 0.15);
            color: #e9d5ff;
            border-color: rgba(168, 85, 247, 0.25);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.15);
        }

        .movie-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
            color: #ffffff;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .metadata {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ext-badge {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            padding: 3px 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            color: #9ca3af;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .card-bottom {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
        }

        .watch-pill {
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #e5e7eb;
            transition: all 0.3s ease;
        }

        .movie-card:hover .watch-pill {
            background: linear-gradient(135deg, #a78bfa 0%, #6366f1 100%);
            border-color: transparent;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }

        .no-results {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Libraries
        </a>
        <a href="/logout" class="logout-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Logout
        </a>
        <header>
            <h1>__LIBRARY_NAME__</h1>
            <p class="subtitle">__LIBRARY_PATH__</p>
        </header>

        <div class="search-container">
            <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" id="search-input" class="search-input" placeholder="Search files in this library..." autocomplete="off">
        </div>

        <div class="grid" id="movie-grid">
            __MOVIE_CARDS__
            <div id="no-results" class="no-results">No movies found matching your search.</div>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const cards = document.querySelectorAll('.movie-card');
        const noResults = document.getElementById('no-results');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            let hasMatches = false;

            cards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                if (name.includes(query)) {
                    card.style.display = 'flex';
                    hasMatches = true;
                } else {
                    card.style.display = 'none';
                }
            });

            if (hasMatches || query === '') {
                noResults.style.display = 'none';
            } else {
                noResults.style.display = 'block';
            }
        });
    </script>
</body>
</html>
