<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sratim TV - Login</title>
    <!-- Use same fonts as modern UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/tv.css">
    <style>
        .tv-login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        .tv-login-card {
            background-color: var(--tv-card-bg);
            padding: 60px;
            border-radius: 24px;
            width: 600px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .tv-input-group {
            margin-bottom: 30px;
            text-align: left;
        }
        .tv-input-label {
            display: block;
            margin-bottom: 15px;
            font-size: 24px;
            color: var(--tv-text-muted);
        }
        .tv-input {
            width: 100%;
            padding: 20px;
            font-size: 32px;
            border-radius: 12px;
            border: 2px solid transparent;
            background-color: #2c2d33;
            color: var(--tv-text);
            box-sizing: border-box;
            outline: none;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
        }
        .tv-input.active-focus, .tv-btn.active-focus {
            transform: scale(1.05);
            box-shadow: 0 0 0 6px var(--tv-focus-color);
            background-color: #383942;
        }
        .tv-btn {
            width: 100%;
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            background-color: #444;
            color: var(--tv-text);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
        }
        .tv-btn.active-focus {
            background-color: #555;
        }
    </style>
</head>
<body class="tv-body">
    <div class="tv-login-container">
        <div class="tv-login-card">
            <h1 class="tv-logo" style="margin-bottom: 40px;">SRATIM TV</h1>
            <form id="loginForm">
                <div class="tv-input-group">
                    <label class="tv-input-label">Username</label>
                    <!-- Inputs specify data-focusable so tv.js tracks them -->
                    <input type="text" id="username" class="tv-input" data-focusable="true" required>
                </div>
                <div class="tv-input-group">
                    <label class="tv-input-label">Password</label>
                    <input type="password" id="password" class="tv-input" data-focusable="true" required>
                </div>
                <button type="submit" class="tv-btn" data-focusable="true" data-action="submit">Login</button>
            </form>
            <div id="errorMessage" style="color: #ff5252; font-size: 24px; margin-top: 20px; display: none;"></div>
        </div>
    </div>

    <!-- Integrate the TV spatial navigation engine -->
    <script src="/tv.js"></script>

    <!-- Handle the actual login -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    window.location.href = '/tv';
                } else {
                    const text = await response.text();
                    const errEl = document.getElementById('errorMessage');
                    errEl.innerText = text;
                    errEl.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                const errEl = document.getElementById('errorMessage');
                errEl.innerText = 'Network error during login';
                errEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
